<!doctype html>
<html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      .marquee-container {
        width: 100vw;
        overflow: hidden;
        white-space: nowrap;
        background: #1a1a1a;
        display: flex;
        align-items: center; 
      }
      .marquee-text {
        display: inline-block;
        padding-left: 100vw;
        animation: marquee 20s linear infinite;
        color: #ff0000;
        font-size: 2rem;
      }
      @keyframes marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-100%); }
      }
    </style>
  </head>
  <body>
    <div class="marquee-container">
      <span class="marquee-text">
       🦵 DON'T SKIP LEG DAY 🏋🏻‍♂️
      </span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
